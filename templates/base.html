<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Handlevakten | Forside</title>
    <link rel="stylesheet" href="static/style.css">
</head>

<body>
    <header>
        <div class="content">
            <div id="logo">
                <a href={{ url_for('index') }}>
                    <img src="static/images/logo.png" alt="">
                    <h1>Handlevakten</h1>
                </a> <!-- Nettsidens logo -->
            </div>
            <nav> <!-- Navigasjon til andre sider -->
                <ul>
                    <li>
                        <a href={{ url_for('index') }}>
                            <img src="static/images/home.png" alt="">
                            <h1>Forside</h1>
                        </a>
                    </li>
                    <li>

                        <a href=>
                            <img src="static/images/heart.png" alt="">
                            <h1>Ønskeliste</h1>
                        </a>
                    </li>
                    <li>
                        <a href={{ url_for('view_profile') }}>
                            <img src="static/images/user.png" alt="">
                            <h1>
                                {% if "username" in session %}
                                Hei {{ session["username"] }}!<br>
                                <a href={{ url_for('logout') }}>Logout</a>
                                {% else %}
                                Min profil
                                {% endif %}
                            </h1>
                        </a>
                    </li>
                </ul>
            </nav>
        </div>
    </header>

    {% block content %}

    {% endblock %}

    <footer class="flexbox"> <!-- Footer med kontaktinformasjon og trykkbar epost -->
        <div class="contact">
            Kontakt oss: | Tlf: +47 123 45 678 | Epost:
            <a href="mailto:handlevakten@noreply.com">handlevakten@noreply.com</a>
        </div>
    </footer>
</body>

</html>
